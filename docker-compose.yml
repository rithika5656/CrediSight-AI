services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: credisight
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/credisight
      DATABASE_URL_SYNC: postgresql://postgres:postgres@db:5432/credisight
      SECRET_KEY: change-this-to-a-strong-random-secret-in-production
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
